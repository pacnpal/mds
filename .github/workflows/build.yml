name: release

on:
  release:
    types: [created]
  # Allow re-running the build for an existing release from the Actions tab.
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build and upload assets to (e.g. v1.1.0)"
        required: true

jobs:
  upload-assets:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      # Don't let one target failing block the rest from shipping.
      fail-fast: false
      matrix:
        include:
          # ---- Linux x86_64 ----
          - { name: mds-linux-x86_64, target: x86_64-unknown-linux-gnu, os: ubuntu-latest }
          - { name: mds-linux-x86_64-musl, target: x86_64-unknown-linux-musl, os: ubuntu-latest }
          # ---- Linux aarch64 (arm64) ----
          - { name: mds-linux-aarch64, target: aarch64-unknown-linux-gnu, os: ubuntu-latest }
          - { name: mds-linux-aarch64-musl, target: aarch64-unknown-linux-musl, os: ubuntu-latest }
          # ---- macOS (both built on the Apple Silicon runner; x86_64 cross-compiles natively) ----
          - { name: mds-macos-x86_64, target: x86_64-apple-darwin, os: macos-latest }
          - { name: mds-macos-aarch64, target: aarch64-apple-darwin, os: macos-latest }
          # ---- Windows ----
          - { name: mds-windows-x86_64, target: x86_64-pc-windows-msvc, os: windows-latest }
          - { name: mds-windows-aarch64, target: aarch64-pc-windows-msvc, os: windows-latest }
    steps:
      - uses: actions/checkout@v5
        with:
          # Build from the exact tagged source on both the release-event
          # and manual workflow_dispatch paths.
          ref: refs/tags/${{ github.event.inputs.tag || github.event.release.tag_name }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Builds the binary (using `cross` automatically for Linux targets that
      # need it), archives it as <matrix.name>.{tar.gz|zip}, generates a
      # SHA256 checksum, and uploads everything to the release. Uses the
      # runner's current stable toolchain, which reads the Cargo.lock v4
      # format that the old rust-build.action could not.
      - name: Build and upload
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: mds
          target: ${{ matrix.target }}
          archive: ${{ matrix.name }}
          include: README.md,CHANGELOG.md
          checksum: sha256
          ref: refs/tags/${{ github.event.inputs.tag || github.event.release.tag_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
